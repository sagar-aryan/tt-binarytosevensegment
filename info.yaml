# Tiny Tapeout project information
project:
  title:        "I2C 7-Segment Display Driver"
  author:       "Aryan Sagar"
  discord:      "nampak248956"  
  description:  "I2C slave that receives 32-bit data and displays it on a multiplexed 7-segment display"
  language:     "Verilog"
  clock_hz:     10000000   # adjust if your clock is different

  tiles: "1x1"

  top_module:  "tt_um_i2c_display"

  source_files:
    - "project.v"

# Pinout description
pinout:
  # Inputs
  ui[0]: "SCL (I2C clock input)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs (segments)
  uo[0]: "ANODE_0 (digit select via transistor)"
  uo[1]: "SEG_A"
  uo[2]: "SEG_B"
  uo[3]: "SEG_C"
  uo[4]: "SEG_D"
  uo[5]: "SEG_E"
  uo[6]: "SEG_F"
  uo[7]: "SEG_G"

  # Bidirectional pins
  uio[0]: "SDA (I2C data)"
  uio[1]: "ANODE_1"
  uio[2]: "ANODE_2"
  uio[3]: "ANODE_3"
  uio[4]: "ANODE_4"
  uio[5]: "ANODE_5"
  uio[6]: "ANODE_6"
  uio[7]: "ANODE_7"

# Do not change!
yaml_version: 6
