# Tiny Tapeout project information
project:
  title:        "UART 8-Digit Display Driver"      # Project title
  author:       "Aryan Sagar"      # Your name
  discord:      "nampak248956"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Receives 32-bit data over UART and displays it on an 8-digit seven-segment display"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_uart_8digit"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - project.v
    - uart_rx.v
    - uart_tx.v

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.)
pinout:
  # Inputs
  ui[0]: "UART RX"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "UART TX"
  uo[1]: "seg a"
  uo[2]: "seg b"
  uo[3]: "seg c"
  uo[4]: "seg d"
  uo[5]: "seg e"
  uo[6]: "seg f"
  uo[7]: "seg g"

  # Bidirectional pins
  uio[0]: "anode 0"
  uio[1]: "anode 1"
  uio[2]: "anode 2"
  uio[3]: "anode 3"
  uio[4]: "anode 4"
  uio[5]: "andoe 5"
  uio[6]: "anode 6"
  uio[7]: "anode 7"

# Do not change!
yaml_version: 6
