yaml_version: 6

project:
  title: "16-bit Binary to BCD Converter with 7-Segment Display Driver"
  author: "Aryan"
  description: "Hardware implementation of a 16-bit binary to BCD converter using double-dabble algorithm with multiplexed 7-segment display driver."

  language: "Verilog"
  clock_hz: 1000
  tiles: "1x1"

  top_module: "tt_um_binary_to_bcd_7seg"

  source_files:
    - design.v

pinout:
  ui[0]: "Binary input bit 0"
  ui[1]: "Binary input bit 1"
  ui[2]: "Binary input bit 2"
  ui[3]: "Binary input bit 3"
  ui[4]: "Binary input bit 4"
  ui[5]: "Binary input bit 5"
  ui[6]: "Binary input bit 6"
  ui[7]: "Binary input bit 7"

  uo[0]: "Segment a (cathode)"
  uo[1]: "Segment b (cathode)"
  uo[2]: "Segment c (cathode)"
  uo[3]: "Segment d (cathode)"
  uo[4]: "Segment e (cathode)"
  uo[5]: "Segment f (cathode)"
  uo[6]: "Segment g (cathode)"
  uo[7]: "Anode select 0"

  uio[0]: "Binary input bit 8"
  uio[1]: "Binary input bit 9"
  uio[2]: "Binary input bit 10"
  uio[3]: "Binary input bit 11"
  uio[4]: "Binary input bit 12"
  uio[5]: "Binary input bit 13"
  uio[6]: "Binary input bit 14"
  uio[7]: "Binary input bit 15"

tags:
  - display
  - converter
  - seven-segment
  - bcd
